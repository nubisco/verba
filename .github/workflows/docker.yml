name: Deploy

on:
  workflow_run:
    workflows: [Release]
    branches: [master]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.package }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: verba-api
            dockerfile: apps/api/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - package: verba-api
            dockerfile: apps/api/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
          - package: verba-ce
            dockerfile: apps/web/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - package: verba-ce
            dockerfile: apps/web/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/nubisco/${{ matrix.package }}

      - name: Push image by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_HASH=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/nubisco/${{ matrix.package }},push-by-digest=true,name-canonical=true,push=true
          no-cache: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.package }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: [verba-api, verba-ce]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.package }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/nubisco/${{ matrix.package }}:latest \
            -t ${{ env.REGISTRY }}/nubisco/${{ matrix.package }}:${{ steps.version.outputs.VERSION }} \
            $(printf '${{ env.REGISTRY }}/nubisco/${{ matrix.package }}@sha256:%s ' *)
