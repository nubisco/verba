services:
  postgres:
    image: postgres:16-alpine
    pull_policy: always
    container_name: verba-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-verba}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-verba}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/nubisco/verba-api:${VERBA_VERSION:-latest}
    pull_policy: always
    container_name: verba-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-verba}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-verba}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@verba.app}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ENABLE_LOCAL_PASSWORD: ${ENABLE_LOCAL_PASSWORD:-false}
      PLATFORM_ISSUER: ${PLATFORM_ISSUER:-}
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    image: ghcr.io/nubisco/verba-ce:${VERBA_VERSION:-latest}
    pull_policy: always
    container_name: verba-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-80}:8080'

volumes:
  postgres_data:
