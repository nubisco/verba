version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verba
      POSTGRES_PASSWORD: verba
      POSTGRES_DB: verba
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verba"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://verba:verba@postgres:5432/verba
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/server:/app
      - /app/node_modules

  client:
    build:
      context: ./packages/client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./packages/client:/app
      - /app/node_modules

volumes:
  postgres_data:
